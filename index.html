<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container d-flex justify-content-between align-items-center">
            <!-- Logo a la izquierda -->
            <a class="navbar-brand" href="#">
                <img src="img/logo.png" alt="Logo" width="120" height="60">
            </a>

            <!-- Menú centrado -->
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#inicio">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#productos">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#empresa">Empresa</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="#descargas">Descargas</a></li>
                </ul>
            </div>

            <!-- Iconos de redes sociales a la derecha -->
            <div class="d-flex gap-3">
                <a href="#"><img src="img/facebook.png" alt="Facebook" width="30" height="30"></a>
                <a href="#"><img src="img/twitter.png" alt="Twitter" width="30" height="30"></a>
                <a href="#"><img src="img/instagram.png" alt="Instagram" width="30" height="30"></a>
                <a href="#"><img src="img/linkedin.png" alt="LinkedIn" width="30" height="30"></a>
            </div>

            <!-- Botón de menú en móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Secciones -->
    <div class="sections-wrapper">
        <section id="inicio" class="bg-light">Inicio</section>
        <section id="productos" class="bg-secondary text-white">Productos</section>
        <section id="empresa" class="bg-info text-white">Empresa</section>
        <section id="contacto" class="bg-success text-white">
            <div class="content">Contacto</div>
            <footer id="footer" class="bg-dark text-white text-center">Pie de página</footer>
        </section>
        
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
